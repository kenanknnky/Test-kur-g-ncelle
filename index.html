<style>

:root{
  --bg:#0E1116; --surface:#161B22; --surface2:#1C232D; --surface3:#222B36;
  --border:#27313E; --border2:#323E4D;
  --text:#E8ECF1; --muted:#8B97A7; --faint:#5C6677;
  --tl:#EDEFF2; --usd:#5AA9E6; --gold:#E0A526;
  --pos:#2FBF71; --neg:#F26266;
  --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
  --sans:'Space Grotesk',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
html,body{margin:0;background:transparent;color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;touch-action:manipulation;overscroll-behavior-y:contain}
button,nav.tabs button,.seg button{-webkit-user-select:none;user-select:none}
.wrap{max-width:1000px;margin:0 auto;padding:calc(18px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right)) calc(60px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left))}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.01em}

header.app{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:11px}
.logo{width:38px;height:38px;border-radius:10px;background:
  conic-gradient(from 220deg,var(--gold),#8a6a14 120deg,var(--usd) 240deg,var(--gold));
  position:relative;flex:0 0 auto}
.logo::after{content:"";position:absolute;inset:5px;border-radius:6px;background:var(--bg)}
.logo::before{content:"₺";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;color:var(--text);z-index:2}
.brand h1{font-size:19px;font-weight:600;margin:0;letter-spacing:-.02em}
.brand p{margin:1px 0 0;font-size:12px;color:var(--muted)}
.btn-add{background:var(--gold);color:#1a1303;border:none;font-family:var(--sans);font-weight:600;font-size:14px;
  padding:10px 16px;border-radius:10px;cursor:pointer;white-space:nowrap;transition:filter .15s}
.btn-add:hover{filter:brightness(1.08)}
.btn-add:focus-visible{outline:2px solid var(--text);outline-offset:2px}

nav.tabs{display:flex;flex-wrap:wrap;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:18px}
nav.tabs button{flex:1 1 30%;min-width:0;background:transparent;border:none;color:var(--muted);font-family:var(--sans);
  font-size:13.5px;font-weight:500;padding:9px 8px;border-radius:8px;cursor:pointer;transition:.15s;white-space:nowrap}
nav.tabs button.on{background:var(--surface3);color:var(--text)}
nav.tabs button:hover:not(.on){color:var(--text)}

.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px}
.grid{display:grid;gap:12px}
.eyebrow{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint);font-weight:600}

.hero{margin-bottom:12px}
.hero .asof{font-size:12px;color:var(--muted);margin-bottom:4px}
.hero .big{font-size:clamp(34px,8vw,52px);font-weight:600;line-height:1;letter-spacing:-.03em;margin:2px 0 8px}
.chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:13px;font-weight:500;
  padding:4px 9px;border-radius:7px}
.chip.pos{color:var(--pos);background:rgba(47,191,113,.12)}
.chip.neg{color:var(--neg);background:rgba(242,98,102,.12)}
.chip.flat{color:var(--muted);background:rgba(139,151,167,.12)}
.chip .since{color:var(--muted);font-family:var(--sans);font-weight:400;margin-left:2px}

.seg{display:flex;gap:3px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:3px;overflow-x:auto}
#periodseg{flex-wrap:wrap}
#periodseg button{flex:1 1 23%;min-width:0}
.seg button{flex:1;min-width:64px;background:transparent;border:none;color:var(--muted);font-family:var(--sans);
  font-size:12.5px;font-weight:500;padding:7px 6px;border-radius:7px;cursor:pointer;white-space:nowrap;transition:.12s}
.seg button.on{background:var(--gold);color:#1a1303;font-weight:600}
.seg button:hover:not(.on){color:var(--text)}

.lenses{grid-template-columns:repeat(3,1fr)}
.lens{position:relative;overflow:hidden}
.lens .bar{position:absolute;left:0;top:0;bottom:0;width:3px}
.lens.tl .bar{background:var(--tl)} .lens.usd .bar{background:var(--usd)} .lens.gold .bar{background:var(--gold)}
.lens .lab{font-size:12px;color:var(--muted);font-weight:500;display:flex;align-items:center;gap:6px;margin-bottom:7px}
.dot{width:7px;height:7px;border-radius:50%}
.lens.tl .dot{background:var(--tl)} .lens.usd .dot{background:var(--usd)} .lens.gold .dot{background:var(--gold)}
.lens .val{font-size:clamp(19px,4.4vw,25px);font-weight:600;letter-spacing:-.02em;line-height:1.05}
.lens .sub{font-size:11px;color:var(--faint);margin-top:9px;font-family:var(--mono)}
.lens .lico{position:absolute;top:11px;right:12px;opacity:.95}
.lens .lico img{width:50px;height:27px;object-fit:cover;border-radius:4px;display:block;box-shadow:0 1px 6px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1)}
.pctgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(84px,1fr));gap:8px}
.tgtcarousel{display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;padding:2px 2px 8px;margin-top:10px}
.tgtcarousel::-webkit-scrollbar{height:5px}
.tgtcarousel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.tgtslide{flex:0 0 86%;max-width:330px;scroll-snap-align:start;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:13px}
.tgthint{font-size:11px;color:var(--faint);margin-top:2px}
.herocar{display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;margin-bottom:12px}
.heroslide{flex:0 0 100%;scroll-snap-align:start;min-width:0}
.lock{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;text-align:center}
.lock input{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:24px;letter-spacing:10px;text-align:center;padding:12px;border-radius:12px;width:230px}
.lock input:focus{outline:none;border-color:var(--gold)}
.lock .lbtn{background:var(--gold);color:#1a1303;border:none;font-family:var(--sans);font-weight:600;font-size:15px;padding:12px 34px;border-radius:11px;cursor:pointer}
.lock .lerr{color:var(--neg);font-size:13px;min-height:18px}

.statrow{grid-template-columns:1fr 1fr}
.stat .v{font-size:clamp(22px,5vw,30px);font-weight:600;letter-spacing:-.02em}
.stat .v.pos{color:var(--pos)} .stat .v.neg{color:var(--neg)}
.stat .l{font-size:12px;color:var(--muted);margin-top:5px}

.cat{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--border)}
.cat:last-child{border-bottom:none}
.cat .nm{width:96px;flex:0 0 auto;font-size:13px}
.cat .track{flex:1;height:8px;background:var(--surface2);border-radius:5px;overflow:hidden}
.cat .fill{height:100%;border-radius:5px}
.cat .amt{flex:0 0 auto;text-align:right;font-family:var(--mono);font-size:13px;min-width:96px}
.cat .pct{flex:0 0 auto;width:46px;text-align:right;font-family:var(--mono);font-size:12px;color:var(--muted)}

.chartbox{position:relative;width:100%}
.chartbox svg{display:block;width:100%;height:auto}
.tooltip{position:absolute;pointer-events:none;background:var(--surface3);border:1px solid var(--border2);
  border-radius:8px;padding:8px 10px;font-size:12px;opacity:0;transition:opacity .1s;z-index:5;min-width:120px;transform:translateX(-50%)}
.tooltip .td{color:var(--muted);font-size:11px;margin-bottom:4px}
.tooltip .tr{display:flex;align-items:center;justify-content:space-between;gap:14px;font-family:var(--mono);margin-top:2px}
.tooltip .tr .k{display:flex;align-items:center;gap:6px;color:var(--muted)}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;font-size:12px;color:var(--muted)}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend i{width:14px;height:3px;border-radius:2px;display:inline-block}

.scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{border-collapse:collapse;width:100%;font-size:12.5px;min-width:640px}
th,td{padding:8px 10px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--border)}
th{color:var(--faint);font-weight:600;font-size:11px;letter-spacing:.04em;text-transform:uppercase;position:sticky;top:0;background:var(--surface)}
th:first-child,td:first-child{text-align:left}
td.n{font-family:var(--mono)}
td .g{color:var(--pos)} td .r{color:var(--neg)}
tr.editrow:hover{background:var(--surface2)}
.rowact{display:flex;gap:6px;justify-content:flex-end}
.iconbtn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:7px;
  padding:4px 9px;font-size:11px;cursor:pointer;font-family:var(--sans)}
.iconbtn:hover{color:var(--text);border-color:var(--border2)}
.iconbtn.danger:hover{color:var(--neg);border-color:var(--neg)}

.overlay{position:fixed;inset:0;background:rgba(6,9,13,.72);backdrop-filter:blur(3px);display:none;
  align-items:flex-start;justify-content:center;padding:24px 14px;z-index:100;overflow-y:auto}
.overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:520px;padding:22px;margin:auto}
.modal h2{margin:0 0 3px;font-size:18px;font-weight:600}
.modal .mp{margin:0 0 18px;font-size:13px;color:var(--muted)}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500}
.field input,.field select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);
  font-family:var(--mono);font-size:16px;padding:10px 11px;border-radius:9px;transition:border-color .12s}
.field input:focus,.field select:focus{outline:none;border-color:var(--gold)}
.field input[type=date]{font-family:var(--sans)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.catinputs{border:1px solid var(--border);border-radius:11px;padding:13px;margin-bottom:13px;background:var(--surface2)}
.catinputs .ch{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:600;margin-bottom:11px;display:flex;justify-content:space-between}
.catline{display:grid;grid-template-columns:1fr 1.3fr;gap:10px;align-items:center;margin-bottom:9px}
.catline:last-child{margin-bottom:0}
.catline label{font-size:13px;color:var(--text);margin:0}
.catline input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);
  font-family:var(--mono);font-size:16px;padding:9px 11px;border-radius:9px}
.catline input:focus{outline:none;border-color:var(--gold)}
.addcat{margin-top:11px;width:100%;background:transparent;border:1px dashed var(--border2);color:var(--muted);
  font-family:var(--sans);font-size:13px;padding:9px;border-radius:9px;cursor:pointer}
.addcat:hover{color:var(--text);border-color:var(--gold)}
.livesum{display:flex;justify-content:space-between;align-items:center;margin-top:11px;padding-top:11px;border-top:1px solid var(--border);font-family:var(--mono)}
.livesum .lt{color:var(--muted);font-family:var(--sans);font-size:13px}
.livesum .lv{font-size:17px;font-weight:600;color:var(--gold)}
.modal-actions{display:flex;gap:10px;margin-top:6px}
.modal-actions button{flex:1;padding:11px;border-radius:10px;font-family:var(--sans);font-weight:600;font-size:14px;cursor:pointer;border:1px solid var(--border)}
.btn-pri{background:var(--gold);color:#1a1303;border:none}
.btn-pri:hover{filter:brightness(1.08)}
.btn-sec{background:var(--surface2);color:var(--text)}
.btn-sec:hover{border-color:var(--border2)}
.err{color:var(--neg);font-size:12px;margin-top:8px;min-height:16px}

.setsec{margin-bottom:22px}
.setsec h3{font-size:14px;font-weight:600;margin:0 0 4px}
.setsec p.d{font-size:12px;color:var(--muted);margin:0 0 12px}
.catedit2{display:grid;grid-template-columns:1fr auto;gap:9px;align-items:center;margin-bottom:9px}
.catedit2 input{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--sans);
  font-size:16px;padding:8px 10px;border-radius:8px}
.catedit2 input:focus{outline:none;border-color:var(--gold)}
.tgtedit{border:1px solid var(--border);border-radius:11px;padding:13px;margin-bottom:11px;background:var(--surface2)}
.tgtedit .tlabel{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:15px;font-weight:500;padding:9px 11px;border-radius:9px}
.tgtedit .tlabel:focus{outline:none;border-color:var(--gold)}
.tgtedit .field input{font-size:16px}
.danger-zone{border-color:rgba(242,98,102,.35)}
.muted-sm{font-size:11.5px;color:var(--faint);margin-top:8px;line-height:1.5}
.empty{text-align:center;color:var(--muted);padding:30px 10px;font-size:13.5px;line-height:1.6}
.note{font-size:11.5px;color:var(--faint);margin-top:14px;line-height:1.55}
.iosbanner{position:fixed;left:12px;right:12px;bottom:calc(12px + env(safe-area-inset-bottom));z-index:200;background:var(--surface3);border:1px solid var(--border2);border-radius:13px;padding:12px 14px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text);box-shadow:0 10px 30px rgba(0,0,0,.4)}
.iosbanner b{color:var(--gold);font-weight:600}
.iosbanner .x{margin-left:auto;color:var(--muted);cursor:pointer;font-size:15px;padding:2px 6px}
.iosbanner .ic{width:26px;height:26px;border-radius:7px;flex:0 0 auto;background:conic-gradient(from 220deg,var(--gold),#8a6a14 120deg,var(--usd) 240deg,var(--gold))}
.hide{display:none!important}
@media(max-width:620px){
  .lenses{grid-template-columns:1fr}
  .statrow{grid-template-columns:1fr}
  .cat .nm{width:74px} .cat .amt{min-width:84px;font-size:12px}
}
</style>

<div class="wrap">
  <header class="app">
    <div class="brand">
      <div class="logo"></div>
      <div><h1>Portföy</h1><p>Servet takibi · ₺ / $ / altın</p></div>
    </div>
    <button class="btn-add" onclick="openEntry(null)">+ Yeni Kayıt</button>
  </header>

  <nav class="tabs" id="tabs">
    <button data-t="panel" class="on">Panel</button>
    <button data-t="dagilim">Dağılım</button>
    <button data-t="kategoriler">Kategoriler</button>
    <button data-t="kayitlar">Kayıtlar</button>
    <button data-t="ayarlar">Ayarlar</button>
  </nav>

  <div id="view"></div>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="lock hide" id="lock"></div>
<div class="iosbanner hide" id="iosbanner"><span class="ic"></span><span>Uygulama gibi kullanmak için: <b>Paylaş</b> &rarr; <b>Ana Ekrana Ekle</b></span><span class="x" onclick="this.parentNode.remove()">&times;</span></div>

<script>
/* ---------- storage ---------- */
const KEY_E='portfolio_entries_v1', KEY_S='portfolio_settings_v1', KEY_A='portfolio_alloc_v1';
const mem={};
async function sget(k){
  if(window.storage){ try{ const r=await window.storage.get(k,false); return r?JSON.parse(r.value):null; }catch(e){ return null; } }
  try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){}
  return mem[k]!==undefined?mem[k]:null;
}
async function sset(k,v){
  mem[k]=v;
  if(window.storage){ try{ await window.storage.set(k,JSON.stringify(v),false); return; }catch(e){} }
  try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){}
}

/* ---------- state ---------- */
let entries=[], settings=null, allocs=[], period='h', chartLens='compare', chartRange='all', rangeStart=null, rangeEnd=null;

/* ---------- seed ---------- */
function seed(){
  const hist=[
    ['2026-01-17',43.23,6650,3120850],['2026-01-24',43.36,6950,3241000],
    ['2026-01-31',43.46,7200,3489600],['2026-02-07',43.59,7350,3271800],
    ['2026-02-14',43.74,7500,3376378],['2026-02-21',43.85,7600,3376610],
    ['2026-02-28',43.94,7450,3457840],['2026-03-07',44.05,7300,3474070],
    ['2026-03-14',44.16,7150,3509641],['2026-03-21',44.35,7050,3480800],
    ['2026-03-28',44.43,6950,3483447],['2026-04-04',44.57,6850,3554453],
    ['2026-04-11',44.66,6780,3668395],['2026-04-18',44.84,6720,3740613],
    ['2026-04-25',45.00,6680,3752564],['2026-05-02',45.11,6660,3760960],
    ['2026-05-09',45.33,6850,3864164],['2026-05-16',45.53,6644,3934781],
    ['2026-05-23',45.70,6650,3806594],['2026-06-06',46.06,6410,3916151],
  ].map((r,i)=>({id:'h'+i,date:r[0],usdTl:r[1],gramXau:r[2],values:null,totalOverride:r[3]}));
  hist.push({id:'snap',date:'2026-06-20',usdTl:46.30,gramXau:6350,
    values:{nakit:17500,bes:355000,fon:3473200,hisse:0,midas:165980,tatil:171400,diger:0},totalOverride:null});
  return hist;
}
function defaultSettings(){
  return {
    version:2,
    categories:[
      {key:'nakit',label:'Nakit'},{key:'bes',label:'BES'},{key:'fon',label:'Fon'},
      {key:'hisse',label:'Hisse'},{key:'midas',label:'Midas'},{key:'tatil',label:'Tatil Fonu'},
      {key:'diger',label:'Diğer'},
    ],
    startDate:'2025-07-19', startValue:1580389, targets:[],
    allocTypes:[{key:'tl',label:'TL'},{key:'doviz',label:'Döviz'},{key:'emtia',label:'Emtia'}]
  };
}

/* ---------- helpers ---------- */
const trNum=(n,d=0)=> (n==null||isNaN(n))?'–':Number(n).toLocaleString('tr-TR',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtTL=n=>'₺'+trNum(Math.round(n));
const fmtUSD=n=>'$'+trNum(Math.round(n));
const fmtGold=n=>trNum(Math.round(n))+' gr';
const fmtPct=n=> (n>=0?'+':'')+trNum(n,2)+'%';
const fmtDate=iso=> new Date(iso+'T00:00:00').toLocaleDateString('tr-TR');
const dObj=iso=> new Date(iso+'T00:00:00');
const fmtFor={tl:fmtTL,usd:fmtUSD,gold:fmtGold};

function total(e){
  if(e.values){ return settings.categories.reduce((s,c)=> s+(Number(e.values[c.key])||0),0); }
  return Number(e.totalOverride)||0;
}
function metric(e,lens){
  const t=total(e);
  if(lens==='usd') return e.usdTl?t/e.usdTl:0;
  if(lens==='gold') return e.gramXau?t/e.gramXau:0;
  return t;
}
function sorted(){ return [...entries].sort((a,b)=> dObj(a.date)-dObj(b.date)); }
function entryNearDaysAgo(s,days){ if(s.length<2) return null; const cur=s[s.length-1]; const target=dObj(cur.date).getTime()-days*86400000; let best=null,bd=Infinity; for(let i=0;i<s.length-1;i++){ const d=Math.abs(dObj(s[i].date).getTime()-target); if(d<bd){bd=d;best=s[i];} } return best; }
function latest(){ const s=sorted(); return s[s.length-1]; }
function latestWithValues(){ const s=sorted(); for(let i=s.length-1;i>=0;i--) if(s[i].values) return s[i]; return null; }

const PERIODS=[
  {key:'h',label:'Haftalık',mode:'prev'},
  {key:'1a',label:'Aylık',days:30},
  {key:'3a',label:'3 Aylık',days:91},
  {key:'6a',label:'6 Aylık',days:182},
  {key:'1y',label:'1 Yıllık',days:365},
  {key:'2y',label:'2 Yıllık',days:730},
  {key:'3y',label:'3 Yıllık',days:1095},
  {key:'5y',label:'5 Yıllık',days:1825},
];
function compareEntry(p){
  const s=sorted(); if(s.length<2) return null;
  const cur=s[s.length-1];
  if(p.mode==='prev') return s[s.length-2];
  const target=dObj(cur.date).getTime()-p.days*86400000;
  const first=dObj(s[0].date).getTime();
  if(target<first-3*86400000) return null;
  let best=null,bd=Infinity;
  for(let i=0;i<s.length-1;i++){ const d=Math.abs(dObj(s[i].date).getTime()-target); if(d<bd){bd=d;best=s[i];} }
  return best;
}
function deltaFor(lens,p){
  const s=sorted(); if(!s.length) return null;
  const cur=s[s.length-1]; const cmp=compareEntry(p);
  if(!cmp) return {na:true};
  const cv=metric(cur,lens), pv=metric(cmp,lens);
  if(!pv) return {na:true};
  return {pct:(cv/pv-1)*100, abs:cv-pv, from:cmp.date};
}
function chipHtml(pct){
  if(pct==null||isNaN(pct)) return '<span class="chip flat">–</span>';
  const c=pct>0.005?'pos':(pct<-0.005?'neg':'flat'); const a=pct>0.005?'▲':(pct<-0.005?'▼':'—');
  return '<span class="chip '+c+'">'+a+' '+fmtPct(pct)+'</span>';
}

/* ---------- PANEL ---------- */
const WM='https://commons.wikimedia.org/wiki/Special:FilePath/';
const LENS_IMG={
 tl:[WM+'100_T%C3%BCrk_Liras%C4%B1_front.jpg?width=160',WM+'20_T%C3%BCrk_Liras%C4%B1_front.jpg?width=160'],
 usd:[WM+'Obverse_of_the_series_2009_%24100_Federal_Reserve_Note.jpg?width=160'],
 gold:[WM+'Gold_bullion_bars.jpg?width=160']};
function lensImgErr(el,k){ const alt=el.dataset.alt; if(alt){ el.dataset.alt=''; el.src=alt; } else { el.outerHTML=LENS_ICONS[k]; } }
const LENS_ICONS={
tl:'<svg width="40" height="26" viewBox="0 0 40 26"><rect x="0.5" y="0.5" width="39" height="25" rx="4" fill="#8E1F28" stroke="#C4525B"/><rect x="3" y="3" width="34" height="20" rx="2.5" fill="none" stroke="#A5424B"/><circle cx="20" cy="13" r="8.6" fill="#A93540"/><text x="20" y="17.8" font-size="13.5" font-weight="700" fill="#F7E9EA" text-anchor="middle" font-family="Space Grotesk,system-ui">₺</text></svg>',
usd:'<svg width="40" height="25" viewBox="0 0 40 25"><rect x="0.5" y="0.5" width="39" height="24" rx="3.5" fill="#2F6B4F" stroke="#79B294"/><rect x="3" y="3" width="34" height="19" rx="2" fill="none" stroke="#4E8A6C" stroke-width="1"/><circle cx="20" cy="12.5" r="7.4" fill="#3B7E5E"/><text x="20" y="15.8" font-size="8.5" font-weight="700" fill="#E2F4E9" text-anchor="middle" font-family="IBM Plex Mono,monospace">100</text><text x="7" y="9" font-size="6" fill="#BFE3CE" text-anchor="middle" font-family="IBM Plex Mono,monospace">$</text><text x="33" y="20" font-size="6" fill="#BFE3CE" text-anchor="middle" font-family="IBM Plex Mono,monospace">$</text></svg>',
gold:'<svg width="40" height="25" viewBox="0 0 40 25"><path d="M6 21 L9.4 13.5 H18 L21.4 21 Z" fill="#D9A425" stroke="#8F6A12" stroke-width="1"/><path d="M19.6 21 L23 13.5 H31.6 L35 21 Z" fill="#E3B23A" stroke="#8F6A12" stroke-width="1"/><path d="M13 12 L16.4 4.8 H25 L28.4 12 Z" fill="#F0C452" stroke="#8F6A12" stroke-width="1"/><path d="M17.4 7.2 h6.4" stroke="#FBE49A" stroke-width="1.4" stroke-linecap="round"/></svg>'};
function renderPanel(){
  const s=sorted();
  if(s.length===0){ return '<div class="card empty">Henüz kayıt yok. Sağ üstten <b>+ Yeni Kayıt</b> ile başlayın.</div>'; }
  const cur=latest(), t=total(cur);
  const wk=deltaFor('tl',{mode:'prev'});
  const cp=PERIODS.find(p=>p.key===period);

  const lensCfg=[
    {k:'tl',cls:'tl',lab:'Türk Lirası',val:metric(cur,'tl'),sub:''},
    {k:'usd',cls:'usd',lab:'Dolar karşılığı',val:metric(cur,'usd'),sub:'USD/TL '+trNum(cur.usdTl,2)},
    {k:'gold',cls:'gold',lab:'Altın karşılığı',val:metric(cur,'gold'),sub:'Gram '+trNum(cur.gramXau)+' ₺'},
  ];
  const lensCards=lensCfg.map(l=>{
    const d=deltaFor(l.k,cp);
    const chip=d&&!d.na?chipHtml(d.pct):'<span class="chip flat">veri yok</span>';
    let amt='';
    if(d&&!d.na&&d.abs!=null&&!isNaN(d.abs)){
      const up=d.abs>=0;
      amt=' <span class="num" style="color:'+(Math.abs(d.abs)<0.5?'var(--muted)':(up?'var(--pos)':'var(--neg)'))+'">'+(up?'+':'−')+fmtFor[l.k](Math.abs(d.abs))+'</span>';
    }
    return '<div class="card lens '+l.cls+'"><div class="bar"></div>'+
      '<div class="lico"><img src="'+LENS_IMG[l.k][0]+'" data-alt="'+(LENS_IMG[l.k][1]||'')+'" alt="" loading="lazy" onerror="lensImgErr(this,&quot;'+l.k+'&quot;)"></div>'+
      '<div class="lab"><span class="dot"></span>'+l.lab+'</div>'+
      '<div class="val num">'+fmtFor[l.k](l.val)+'</div>'+
      '<div class="sub">'+cp.label+': '+chip+amt+(l.sub?' · '+l.sub:'')+'</div></div>';
  }).join('');

  const sinceVal=settings.startValue?((t/settings.startValue-1)*100):null;
  const sinceCls=sinceVal==null?'':(sinceVal>=0?'pos':'neg');

  // ----- Hedefler kartı (çoklu) -----
  let hedefHtml='';
  const tgts=Array.isArray(settings.targets)?settings.targets:[];
  if(tgts.length){
    const past=entryNearDaysAgo(s,91); const rate=cur.usdTl||1;
    let recentM_tl=null, recentM_usd=null;
    if(past){ const dd=(dObj(cur.date).getTime()-dObj(past.date).getTime())/86400000;
      if(dd>0){ recentM_tl=(t-total(past))/(dd/30.44); recentM_usd=(t/rate-total(past)/(past.usdTl||rate))/(dd/30.44); } }
    const sortedT=[...tgts].filter(g=>(Number(g.amount)||0)>0||(Number(g.amountUsd)||0)>0)
      .sort((a,b)=>{const da=a.date?dObj(a.date).getTime():Infinity,db=b.date?dObj(b.date).getTime():Infinity;return (da-db)||(((Number(a.amount)||0)-(Number(b.amount)||0)));});
    const today0=new Date(); today0.setHours(0,0,0,0);
    let focusIdx=sortedT.length?sortedT.length-1:0;
    for(let i=0;i<sortedT.length;i++){ const g=sortedT[i]; if(g.date&&dObj(g.date).getTime()>=today0.getTime()){ focusIdx=i; break; } }
    window.__tgtFocus=focusIdx;
    function tgtLine(amt,curVal,fmtA,recentMonthly,g,color){
      const remaining=amt-curVal; const prog=Math.max(0,Math.min(100,curVal/amt*100)); const reached=curVal>=amt;
      let sub='';
      if(reached){ sub='Ulaşıldı 🎉'; }
      else{
        sub='Kalan '+fmtA(remaining);
        if(g.date){
          const daysLeft=Math.round((dObj(g.date).getTime()-dObj(cur.date).getTime())/86400000);
          if(daysLeft<=0){ sub+=' · tarih geçti'; }
          else{
            const weeksLeft=Math.round(daysLeft/7); const reqMonthly=remaining/(daysLeft/30.44);
            sub+=' · '+weeksLeft+' hf · aylık ~'+fmtA(reqMonthly);
            if(recentMonthly!=null){ const ok=recentMonthly>=reqMonthly; sub+=' <span class="chip '+(ok?'pos':'neg')+'">'+(ok?'yolunda':'hız artmalı')+'</span>'; }
          }
        }
      }
      return '<div style="display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:5px;margin-top:8px">'+
          '<span class="num" style="font-size:12px;color:var(--muted)">Mevcut '+fmtA(curVal)+'</span>'+
          '<span class="num" style="font-size:14px;font-weight:600;white-space:nowrap">'+fmtA(amt)+'</span></div>'+
        '<div style="height:8px;background:var(--surface2);border-radius:5px;overflow:hidden;margin-bottom:6px">'+
          '<div style="height:100%;width:'+prog.toFixed(1)+'%;background:'+(reached?'var(--pos)':color)+'"></div></div>'+
        '<div class="num" style="font-size:12px;color:var(--muted)"><span style="color:'+(reached?'var(--pos)':'var(--text)')+'">%'+trNum(prog,0)+'</span> · '+sub+'</div>';
    }
    const rowsH=sortedT.map((g,gi)=>{
      const aT=Number(g.amount)||0, aU=Number(g.amountUsd)||0;
      if(aT<=0&&aU<=0) return '';
      let body='';
      if(aT>0) body+=tgtLine(aT,t,fmtTL,recentM_tl,g,'var(--gold)');
      if(aU>0) body+=tgtLine(aU,t/rate,fmtUSD,recentM_usd,g,'var(--usd)');
      let rateLine='';
      if(g.estRate||g.actRate){
        rateLine='<div class="num" style="font-size:11.5px;color:var(--faint);margin-top:3px">';
        if(g.estRate) rateLine+='Kur tahmini '+trNum(g.estRate,2);
        if(g.actRate){
          rateLine+=(g.estRate?' · ':'')+'gerçekleşen '+trNum(g.actRate,2);
          if(g.estRate){ const dv=(g.actRate/g.estRate-1)*100;
            rateLine+=' <span class="'+(Math.abs(dv)<=2?'chip pos':'chip flat')+'" style="font-size:10.5px;padding:2px 6px">'+(dv>=0?'+':'')+trNum(dv,1)+'% sapma</span>'; }
        } else if(g.estRate&&g.amountUsd){ rateLine+=' · $ hedefi ≈ '+fmtTL(g.amountUsd*g.estRate); }
        rateLine+='</div>';
      }
      return '<div class="tgtslide">'+
        '<div style="font-size:14px;font-weight:500">'+(g.label||'Hedef')+(g.date?' <span style="color:var(--faint);font-size:11px;font-weight:400">'+fmtDate(g.date)+'</span>':'')+'</div>'+
        rateLine+body+'</div>';
    }).join('');
    const many=sortedT.length>1;
    hedefHtml='<div class="card" style="margin-bottom:12px"><div class="eyebrow">Hedefler · mevcut '+fmtTL(t)+' / '+fmtUSD(t/rate)+'</div>'+
      '<div class="tgtcarousel">'+rowsH+'</div>'+
      (many?'<div class="tgthint">← geçmiş hedefler · kaydırın · gelecek hedefler →</div>':'')+'</div>';
  } else {
    hedefHtml='<div class="card" style="margin-bottom:12px"><div class="eyebrow" style="margin-bottom:8px">Hedefler</div>'+
      '<div style="font-size:13px;color:var(--muted);line-height:1.55">Hedef eklemek için <b>Ayarlar → Hedefler</b> bölümünü kullanın. Birden çok hedef (kısa/uzun vadeli) ekleyebilirsiniz; her birinin ilerlemesi burada görünür.</div></div>';
  }

  // ----- İki tarih arası artış kartı -----
  const dts=s.map(e=>e.date);
  if(!rangeStart||dts.indexOf(rangeStart)<0) rangeStart=dts[0];
  if(!rangeEnd||dts.indexOf(rangeEnd)<0) rangeEnd=dts[dts.length-1];
  const eA=s.find(e=>e.date===rangeStart), eB=s.find(e=>e.date===rangeEnd);
  const optA=dts.map(d=>'<option value="'+d+'"'+(d===rangeStart?' selected':'')+'>'+fmtDate(d)+'</option>').join('');
  const optB=dts.map(d=>'<option value="'+d+'"'+(d===rangeEnd?' selected':'')+'>'+fmtDate(d)+'</option>').join('');
  let rres='';
  if(eA&&eB){
    const tlA=metric(eA,'tl'),tlB=metric(eB,'tl');
    const dTL=tlB-tlA, pTL=tlA?(tlB/tlA-1)*100:null;
    const pU=metric(eA,'usd')?(metric(eB,'usd')/metric(eA,'usd')-1)*100:null;
    const pG=metric(eA,'gold')?(metric(eB,'gold')/metric(eA,'gold')-1)*100:null;
    rres='<div class="num" style="font-size:22px;font-weight:600;margin-top:6px">'+(dTL>=0?'+':'−')+'₺'+trNum(Math.abs(Math.round(dTL)))+' '+chipHtml(pTL)+'</div>'+
      '<div class="num" style="font-size:12.5px;color:var(--muted);margin-top:7px">$ karşılığı '+(pU==null?'–':fmtPct(pU))+' · altın '+(pG==null?'–':fmtPct(pG))+'</div>';
  }
  const rangeHtml='<div class="card" style="margin-bottom:12px">'+
    '<div class="eyebrow" style="margin-bottom:12px">İki tarih arası artış</div>'+
    '<div class="row2">'+
      '<div class="field" style="margin:0"><label>Başlangıç</label><select id="rangeStart">'+optA+'</select></div>'+
      '<div class="field" style="margin:0"><label>Bitiş</label><select id="rangeEnd">'+optB+'</select></div>'+
    '</div>'+rres+'</div>';

  const lv=latestWithValues();
  let breakdown='', allocMini='';
  if(lv){
    const colors=['#5AA9E6','#2FBF71','#E0A526','#C77DD6','#E07A5A','#5BD6C0','#9BB0C9','#D6B85A'];
    const tt=total(lv);
    const rows=settings.categories.map((c,i)=>{
      const amt=Number(lv.values[c.key])||0;
      const pct=tt?amt/tt*100:0; const col=colors[i%colors.length];
      return '<div class="cat"><div class="nm">'+c.label+'</div>'+
        '<div class="track"><div class="fill" style="width:'+pct.toFixed(1)+'%;background:'+col+'"></div></div>'+
        '<div class="amt num">'+fmtTL(amt)+'</div><div class="pct num">'+pct.toFixed(0)+'%</div></div>';
    }).join('');
    ensureCatAlloc();
    const aTypes=settings.allocTypes||[];
    const aItems=aTypes.map((tp,i)=>({k:tp.key,l:tp.label,v:typeValue(lv,tp.key),c:ALLOC_COLORS[i%ALLOC_COLORS.length]}));
    const aTot=aItems.reduce((a,x)=>a+x.v,0);
    if(aTot>0){ allocMini='<div style="display:flex;gap:18px;align-items:center;flex-wrap:wrap;margin-top:14px;padding-top:13px;border-top:1px solid var(--border)">'+
      '<div>'+pieSvg(aItems,120)+'</div><div style="flex:1;min-width:150px">'+
      aItems.map(x=>'<div style="display:flex;align-items:center;gap:7px;margin-bottom:6px"><span style="width:9px;height:9px;border-radius:3px;background:'+x.c+';flex:0 0 auto"></span>'+
        '<span style="font-size:12.5px">'+x.l+'</span><span class="num" style="margin-left:auto;font-size:12px;color:var(--muted)">%'+(aTot?Math.round(x.v/aTot*100):0)+'</span></div>').join('')+
      '</div></div>'; }
    breakdown='<div class="card"><div class="eyebrow" style="margin-bottom:14px">Kategori dağılımı · '+fmtDate(lv.date)+'</div>'+rows+'</div>';
  }else{
    breakdown='<div class="card empty">Kategori dağılımı için kategori kırılımlı bir kayıt ekleyin.</div>';
  }

  // ----- projeksiyon (son ~6 ayın bileşik aylık artışına göre) -----
  let projInner='';
  {
    const base=entryNearDaysAgo(s,182)||s[0];
    const dd=base?(dObj(cur.date).getTime()-dObj(base.date).getTime())/86400000:0;
    if(s.length>=3&&dd>=28&&total(base)>0){
      const months=dd/30.44;
      const mRate=Math.pow(t/total(base),1/months)-1;
      const projRows=[['3 Ay',3],['6 Ay',6],['1 Yıl',12],['2 Yıl',24],['3 Yıl',36],['5 Yıl',60],['10 Yıl',120]].map(p=>{
        const v=t*Math.pow(1+mRate,p[1]);
        return '<div style="display:flex;justify-content:space-between;align-items:baseline;padding:4.5px 0;border-bottom:1px solid var(--border)"><span style="font-size:12.5px;color:var(--muted)">'+p[0]+'</span><span class="num" style="font-size:13.5px">'+fmtTL(v)+'</span></div>';
      }).join('');
      projInner='<div class="asof">Projeksiyon · aylık ort. <span class="num" style="color:'+(mRate>=0?'var(--pos)':'var(--neg)')+'">'+fmtPct(mRate*100)+'</span> ('+fmtDate(base.date)+' bazlı)</div>'+
        projRows+
        '<div style="font-size:10.5px;color:var(--faint);margin-top:9px;line-height:1.5">Son dönem hızınızın aynen sürdüğü varsayımıyla, TL bazında ve nominaldir (enflasyon düşülmemiştir); garanti değildir.</div>';
    } else {
      projInner='<div class="asof">Projeksiyon</div><div style="font-size:13px;color:var(--muted);margin-top:8px;line-height:1.6">Projeksiyon için en az ~1 aylık veri aralığı gerekiyor. Kayıt girdikçe burada 3 ay – 10 yıl tahminleri belirecek.</div>';
    }
  }
  return ''+
  '<div class="herocar">'+
    '<div class="heroslide card hero" style="margin-bottom:0">'+
      '<div class="asof">'+fmtDate(cur.date)+' itibarıyla toplam servet</div>'+

    datasets=[{color:col,name:{tl:'TL',usd:'Dolar',gold:'Altın'}[chartLens],points:s.map(e=>({date:e.date,y:metric(e,chartLens)})),fmt:fmtFor[chartLens]}];
  }
  document.getElementById('legend').innerHTML=legend;

  const W=800,H=320,pl=64,pr=18,pt=18,pb=34;
  let ymin=Infinity,ymax=-Infinity;
  datasets.forEach(d=>d.points.forEach(p=>{ymin=Math.min(ymin,p.y);ymax=Math.max(ymax,p.y);}));
  if(ymin===ymax){ymin*=.98;ymax*=1.02;}
  const pad=(ymax-ymin)*0.08; ymin-=pad; ymax+=pad;
  const n=s.length;
  const X=i=> pl+(W-pl-pr)*(n===1?0.5:i/(n-1));
  const Y=v=> pt+(H-pt-pb)*(1-(v-ymin)/(ymax-ymin));

  let grid='',yl='';
  for(let g=0;g<=4;g++){ const v=ymin+(ymax-ymin)*g/4; const y=Y(v);
    grid+='<line x1="'+pl+'" y1="'+y+'" x2="'+(W-pr)+'" y2="'+y+'" stroke="#27313E" stroke-width="1"/>';
    const lab=chartLens==='compare'?trNum(v,0):(chartLens==='tl'?(Math.round(v/1000)+'B'):(chartLens==='usd'?('$'+trNum(Math.round(v/1000))+'B'):trNum(Math.round(v))));
    yl+='<text x="'+(pl-8)+'" y="'+(y+4)+'" text-anchor="end" fill="#5C6677" font-size="11" font-family="IBM Plex Mono">'+lab+'</text>';
  }
  let xl=''; [0,Math.floor((n-1)/2),n-1].forEach(i=>{ const e=s[i]; const x=X(i);
    xl+='<text x="'+x+'" y="'+(H-12)+'" text-anchor="middle" fill="#5C6677" font-size="11" font-family="IBM Plex Mono">'+fmtDate(e.date).slice(0,5)+'</text>';
  });
  let paths='';
  datasets.forEach((d)=>{
    const pts=d.points.map((p,i)=>[X(i),Y(p.y)]);
    const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
    if(datasets.length===1){
      const area=line+' L '+X(n-1)+' '+(H-pb)+' L '+X(0)+' '+(H-pb)+' Z';
      paths+='<defs><linearGradient id="ag" x1="0" x2="0" y1="0" y2="1">'+
        '<stop offset="0" stop-color="'+d.color+'" stop-opacity="0.22"/><stop offset="1" stop-color="'+d.color+'" stop-opacity="0"/></linearGradient></defs>'+
        '<path d="'+area+'" fill="url(#ag)"/>';
    }
    paths+='<path d="'+line+'" fill="none" stroke="'+d.color+'" stroke-width="2" vector-effect="non-scaling-stroke" stroke-linejoin="round" stroke-linecap="round"/>';
    const last=pts[pts.length-1];
    paths+='<circle cx="'+last[0]+'" cy="'+last[1]+'" r="3.5" fill="'+d.color+'"/>';
  });

  box.innerHTML='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="width:100%;height:auto;aspect-ratio:'+W+'/'+H+'">'+
    grid+yl+xl+paths+
    '<line id="cross" x1="0" y1="'+pt+'" x2="0" y2="'+(H-pb)+'" stroke="#5C6677" stroke-width="1" stroke-dasharray="3 3" opacity="0"/>'+
    '</svg><div class="tooltip" id="tip"></div>';

  const svg=box.querySelector('svg'), tip=box.querySelector('#tip'), cross=box.querySelector('#cross');
  function move(ev){
    const rect=svg.getBoundingClientRect();
    const cx=((ev.touches?ev.touches[0].clientX:ev.clientX)-rect.left)/rect.width*W;
    let bi=0,bd=Infinity; for(let i=0;i<n;i++){const d=Math.abs(X(i)-cx);if(d<bd){bd=d;bi=i;}}
    const px=X(bi);
    cross.setAttribute('x1',px);cross.setAttribute('x2',px);cross.setAttribute('opacity','0.7');
    const left=(px/W)*rect.width;
    tip.style.left=Math.max(60,Math.min(rect.width-60,left))+'px';
    tip.style.top=(pt/H*rect.height)+'px';
    tip.style.opacity='1';
    tip.innerHTML='<div class="td">'+fmtDate(s[bi].date)+'</div>'+datasets.map(d=>
      '<div class="tr"><span class="k"><i style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+d.color+'"></i>'+d.name+'</span><span>'+d.fmt(d.points[bi].y)+'</span></div>').join('');
  }
  function leave(){tip.style.opacity='0';cross.setAttribute('opacity','0');}
  svg.addEventListener('mousemove',move); svg.addEventListener('mouseleave',leave);
  svg.addEventListener('touchstart',move); svg.addEventListener('touchmove',move); svg.addEventListener('touchend',leave);
}

/* ---------- KATEGORİLER ---------- */
function entriesWithValuesSorted(){ return sorted().filter(e=>e.values); }
function catCmpEntry(s,p){
  if(s.length<2) return null;
  const cur=s[s.length-1];
  if(p.mode==='prev') return s[s.length-2];
  const target=dObj(cur.date).getTime()-p.days*86400000;
  if(target<dObj(s[0].date).getTime()-3*86400000) return null;
  let best=null,bd=Infinity;
  for(let i=0;i<s.length-1;i++){ const d=Math.abs(dObj(s[i].date).getTime()-target); if(d<bd){bd=d;best=s[i];} }
  return best;
}
function renderCategories(){
  const s=entriesWithValuesSorted();
  if(s.length===0) return '<div class="card empty">Kategori kırılımı içeren kayıt yok.<br>Yeni Kayıt eklerken kategori değerlerini girdikçe burası dolar.</div>';

  const periods=[{label:'1 Hf',mode:'prev'},{label:'1 Ay',days:30},{label:'3 Ay',days:91},{label:'6 Ay',days:182},{label:'1 Yıl',days:365},{label:'3 Yıl',days:1095}];

  const cellPct=(curVal,key,i)=>{ const c=cmp[i]; if(!c) return pc(null); const pv=Number(c.values[key])||0; if(pv<=0) return pc(null); return pc((curVal/pv-1)*100); };

    return '<tr class="editrow"><td>'+c.label+'</td><td class="n">'+fmtTL(cv)+'</td>'+cells+'</tr>';

  const tCur=total(cur);

  const totRow='<tr style="border-top:2px solid var(--border2)"><td><b>Toplam</b></td><td class="n"><b>'+fmtTL(tCur)+'</b></td>'+totCells+'</tr>';

  return '<div class="card"><div class="eyebrow" style="margin-bottom:12px">Kategori bazında değişim · '+fmtDate(cur.date)+'</div>'+
    '<div class="scroll"><table>'+head+'<tbody>'+rows+totRow+'</tbody></table></div>'+hint+'</div>';
}

function allocCmp(s,p){ if(s.length<2) return null; const cur=s[s.length-1];

  const target=dObj(cur.date).getTime()-p.days*86400000;

let __pieN=0;
function shadeHex(c,f){ try{ const n=parseInt(c.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.min(255,Math.round(r+(255-r)*f)); g=Math.min(255,Math.round(g+(255-g)*f)); b=Math.min(255,Math.round(b+(255-b)*f));
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1); }catch(e){ return c; } }
function pieSvg(items,w){ w=w||230;

    a=a2; });

function ensureCatAlloc(){ if(!settings.catAlloc) settings.catAlloc={};
  settings.categories.forEach(c=>{ if(!settings.catAlloc[c.key]) settings.catAlloc[c.key]={tl:100}; }); }
function typeValue(e,tk){ return settings.categories.reduce((s,c)=> s+(Number(e.values[c.key])||0)*(((settings.catAlloc||{})[c.key]||{})[tk]||0)/100,0); }
async function setCatAllocAmt(ck,tk,inp){

/* ---------- güncel kur çekme (ücretsiz kaynaklar, sıralı yedekli) ---------- */
async function fetchUsdRate(){
  const get=async(url,ms)=>{ const c=new AbortController(); const t=setTimeout(()=>c.abort(),ms||8000);
    try{ const r=await fetch(url,{signal:c.signal,cache:'no-store',mode:'cors'}); clearTimeout(t); if(!r.ok) return null; return await r.json(); }
    catch(e){ clearTimeout(t); return null; } };
  const num=x=>{ if(x==null) return null; if(typeof x==='object') x=(x['Satış']??x.Selling??x['Alış']??x.Buying); if(typeof x==='string') x=x.replace(/[^0-9.,]/g,'').replace(/\./g,'').replace(',','.'); const n=parseFloat(x); return (isNaN(n)||n<=0)?null:n; };
  const bust='?t='+Date.now();
  let j=await get('https://finans.truncgil.com/v4/today.json'+bust,6000); let r=j?num(j.USD):null;
  if(!r){ j=await get('https://finans.truncgil.com/today.json'+bust,5000); if(j) r=num(j.USD); }
  if(!r){ j=await get('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json'+bust); if(j&&j.usd&&Number(j.usd.try)>0) r=Number(j.usd.try); }
  if(!r){ j=await get('https://api.frankfurter.app/latest?from=USD&to=TRY'); if(j&&j.rates&&j.rates.TRY) r=Number(j.rates.TRY); }
  if(!r){ j=await get('https://open.er-api.com/v6/latest/USD'); if(j&&j.rates&&j.rates.TRY) r=Number(j.rates.TRY); }
  return r;
}
async function fetchActRate(i){
  const g=settings.targets[i]; if(!g) return;
  const r=await fetchUsdRate();
  if(!r){ alert('Kur çekilemedi — internet bağlantısını kontrol edin.'); return; }
  g.actRate=Math.round(r*100)/100; await sset(KEY_S,settings); render();
}
async function autoFillActRates(){
  try{
    if(!Array.isArray(settings.targets)) return;
    const today=new Date(); today.setHours(0,0,0,0);
    const due=settings.targets.filter(g=>g.date&&!g.actRate&&dObj(g.date).getTime()<=today.getTime()&&(today.getTime()-dObj(g.date).getTime())<=7*86400000);
    if(!due.length) return;
    const r=await fetchUsdRate(); if(!r) return;
    due.forEach(g=>{ g.actRate=Math.round(r*100)/100; });
    await sset(KEY_S,settings); render();
  }catch(e){}
}

    try{ const r=await fetch(url,{signal:c.signal,cache:'no-store',mode:'cors'}); clearTimeout(t); if(!r.ok) return null; return await r.json(); }
    catch(e){ clearTimeout(t); return null; } };
  const num=x=>{ if(x==null) return null; if(typeof x==='object') x=(x['Satış']??x['satis']??x.Selling??x.selling??x['Alış']??x.Buying); if(typeof x==='string') x=x.replace(/[^0-9.,]/g,'').replace(/\./g,'').replace(',','.'); const n=parseFloat(x); return (isNaN(n)||n<=0)?null:n; };
  const bust='?t='+Date.now();
  let rate=null, gram=null; const diag=[];
  // 1) Truncgil v4 (Türkiye, güncel sürüm: kur + gram altın)
  let j=await get('https://finans.truncgil.com/v4/today.json'+bust,6000);
  if(j){ const r=num(j.USD), g=num(j.GRA||j['gram-altin']||j['Gram Altın']);
    if(r){rate=r;} if(g){gram=g;} diag.push('TR4'+((r||g)?'✓':'✗')); } else diag.push('TR4✗');
  // 2) Truncgil klasik
  if(!rate||!gram){ j=await get('https://finans.truncgil.com/today.json'+bust,5000);
    if(j){ const r=num(j.USD), g=num(j['gram-altin']||j['Gram Altın']);
      if(!rate&&r) rate=r; if(g) gram=g; diag.push('TR'+((r||g)?'✓':'✗')); } else diag.push('TR✗'); }
  // 3) jsDelivr CDN (kur + ons)
  if(!rate||!gram){ j=await get('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json'+bust);
    if(!j) j=await get('https://latest.currency-api.pages.dev/v1/currencies/usd.json'+bust);
    if(j&&j.usd){ const r=Number(j.usd.try), x=Number(j.usd.xau);
      if(!rate&&r>0) rate=r; if(!gram&&r>0&&x>0) gram=(1/x)/31.1034768*(rate||r); diag.push('CDN✓'); } else diag.push('CDN✗'); }
  // 4) Frankfurter (ECB kuru)
  if(!rate){ j=await get('https://api.frankfurter.app/latest?from=USD&to=TRY');
    if(j&&j.rates&&j.rates.TRY){ rate=Number(j.rates.TRY); diag.push('FR✓'); } else diag.push('FR✗'); }
  // 5) er-api + gold-api yedek
  if(!rate){ j=await get('https://open.er-api.com/v6/latest/USD'); if(j&&j.rates&&j.rates.TRY){ rate=Number(j.rates.TRY); diag.push('ER✓'); } else diag.push('ER✗'); }
  if(!gram&&rate){ j=await get('https://api.gold-api.com/price/XAU'); if(j&&j.price){ gram=Number(j.price)/31.1034768*rate; diag.push('AU✓'); } else diag.push('AU✗'); }
  const fu=document.getElementById('f_usd'), fg=document.getElementById('f_gold');
  const got=[];
  if(rate&&fu){ fu.value=(Math.round(rate*100)/100).toString().replace('.',','); got.push('USD/TL '+trNum(rate,2)); }
  if(gram&&fg){ fg.value=Math.round(gram); got.push('gram '+trNum(Math.round(gram))+' ₺'); }
  if(st) st.textContent= got.length? '✓ '+got.join(' · ')+' — düzenleyebilirsiniz' : 'Çekilemedi ['+diag.join(' ')+'] — bu kodu Claude\'a iletin, elle de girebilirsiniz';
  if(btn) btn.disabled=false;
}

/* ---------- settings actions ---------- */
async function editCat(i,value){ settings.categories[i].label=value; await sset(KEY_S,settings); }
async function addCat(){ settings.categories.push({key:'c'+Date.now(),label:'Yeni kalem'}); await sset(KEY_S,settings); render(); }
async function addTarget(){ if(!Array.isArray(settings.targets)) settings.targets=[]; settings.targets.push({id:'t'+Date.now(),label:'Yeni hedef',amount:null,date:null}); await sset(KEY_S,settings); render(); }
async function editTarget(i,f,v){ const g=settings.targets[i]; if(!g) return; g[f]= (f==='amount'||f==='amountUsd')?(parseNum(v)||null):((f==='estRate'||f==='actRate')?(parseRate(v)||null):v); await sset(KEY_S,settings); }
async function removeTarget(i){ const g=settings.targets[i]; if(!confirm('"'+(g&&g.label||'Hedef')+'" silinsin mi?')) return; settings.targets.splice(i,1); await sset(KEY_S,settings); render(); }
async function removeCat(i){ const c=settings.categories[i]; if(!confirm('"'+c.label+'" kategorisi kaldırılsın mı?')) return;
  settings.categories.splice(i,1); entries.forEach(e=>{if(e.values) delete e.values[c.key];}); await sset(KEY_S,settings); await sset(KEY_E,entries); render(); }
async function setS(f,v){ settings[f]= (f==='startDate'||f==='targetDate')?v:(parseNum(v)||null); await sset(KEY_S,settings); if(currentTab==='panel') render(); }

function exportData(){
  const blob=new Blob([JSON.stringify({entries,settings,allocs,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='portfoy-yedek-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
}
function importData(inp){
  const f=inp.files[0]; if(!f) return; const rd=new FileReader();
  rd.onload=async()=>{ try{ const d=JSON.parse(rd.result);
    if(d.entries) entries=d.entries; if(d.settings) settings=d.settings; if(d.allocs) allocs=d.allocs;
    if(!Array.isArray(settings.allocTypes)) settings.allocTypes=[{key:'tl',label:'TL'},{key:'doviz',label:'Döviz'},{key:'emtia',label:'Emtia'}];
    await sset(KEY_E,entries); await sset(KEY_S,settings); await sset(KEY_A,allocs); render(); alert('Yedek başarıyla yüklendi.');
  }catch(e){ alert('Dosya okunamadı. Geçerli bir yedek dosyası seçin.'); } };
  rd.readAsText(f); inp.value='';
}
async function resetAll(){
  if(!confirm('TÜM kayıtlar ve ayarlar silinecek. Emin misiniz?')) return;
  if(!confirm('Bu işlem geri alınamaz. Devam edilsin mi?')) return;
  entries=[]; allocs=[]; settings=defaultSettings(); await sset(KEY_E,entries); await sset(KEY_S,settings); await sset(KEY_A,allocs); render();
}

/* ---------- PIN kilidi ---------- */
async function pinHash(sv){ try{ const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('portfoy|'+sv)); return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join(''); }
  catch(e){ let h=5381; const q='portfoy|'+sv; for(let i=0;i<q.length;i++){ h=((h<<5)+h+q.charCodeAt(i))>>>0; } return 'x'+h.toString(16); } }
function showLock(){
  const el=document.getElementById('lock');
  el.innerHTML='<div class="logo" style="width:52px;height:52px"></div>'+
    '<div style="font-size:17px;font-weight:600">Portföy kilitli</div>'+
    '<input id="pin_in" type="password" inputmode="numeric" maxlength="'+settings.pin.len+'" autocomplete="off" placeholder="••••" onkeydown="if(event.key===\'Enter\')tryUnlock()" oninput="if(this.value.length>='+settings.pin.len+')tryUnlock()">'+
    '<div class="lerr" id="pin_err"></div>'+
    '<button class="lbtn" onclick="tryUnlock()">Aç</button>'+
    '<button class="btn-ghost" onclick="forgotPin()">PIN\'i unuttum</button>';
  el.classList.remove('hide');
  setTimeout(()=>{const i=document.getElementById('pin_in'); if(i) i.focus();},80);
}
async function tryUnlock(){
  const i=document.getElementById('pin_in'), e=document.getElementById('pin_err');
  const v=(i.value||'').trim();
  if(await pinHash(v)===settings.pin.hash){ document.getElementById('lock').classList.add('hide'); }
  else { e.textContent='Yanlış PIN'; i.value=''; i.focus(); }
}
async function forgotPin(){
  const q=settings.pin.recQ?('Kurtarma sorunuz: '+settings.pin.recQ):'Kurtarma cevabınızı girin:';
  const a=prompt(q); if(a==null) return;
  if(await pinHash(a.trim().toLowerCase())===settings.pin.recHash){
    delete settings.pin; await sset(KEY_S,settings);
    document.getElementById('lock').classList.add('hide');
    alert('PIN kaldırıldı. İsterseniz Ayarlar bölümünden yeni PIN oluşturabilirsiniz.');
    if(currentTab==='ayarlar') render();
  } else alert('Cevap eşleşmedi.');
}
async function createPin(){
  const p=(document.getElementById('np_pin').value||'').trim();
  const q=(document.getElementById('np_q').value||'').trim();
  const a=(document.getElementById('np_a').value||'').trim();
  if(!/^[0-9]{4,6}$/.test(p)){ alert('PIN 4 ile 6 arası rakamdan oluşmalı.'); return; }
  if(!a){ alert('Kurtarma cevabı boş olamaz — PIN unutulursa tek kurtarma yolu bu.'); return; }
  settings.pin={hash:await pinHash(p),len:p.length,recQ:q,recHash:await pinHash(a.toLowerCase())};
  await sset(KEY_S,settings); render();
  alert('PIN etkin. Uygulama bir sonraki açılışta PIN soracak.');
}
async function removePin(){
  const p=prompt('Mevcut PIN:'); if(p==null) return;
  if(await pinHash(p.trim())===settings.pin.hash){ delete settings.pin; await sset(KEY_S,settings); render(); }
  else alert('Yanlış PIN.');
}

/* ---------- routing ---------- */
let currentTab='panel';
function render(){
  const v=document.getElementById('view');
  if(currentTab==='panel') v.innerHTML=renderPanel();
  else if(currentTab==='dagilim') v.innerHTML=renderAlloc();
  else if(currentTab==='kayitlar') v.innerHTML=renderRecords();
  else if(currentTab==='kategoriler') v.innerHTML=renderCategories();
  else if(currentTab==='ayarlar') v.innerHTML=renderSettings();
  wireDynamic();
}
function wireDynamic(){
  const ps=document.getElementById('periodseg');
  if(ps) ps.querySelectorAll('button').forEach(b=>b.onclick=()=>{period=b.dataset.p;render();});
  document.querySelectorAll('[data-cl]').forEach(b=>b.onclick=()=>{chartLens=b.dataset.cl;render();});
  const rs=document.getElementById('rangeseg');
  if(rs) rs.querySelectorAll('button').forEach(b=>b.onclick=()=>{chartRange=b.dataset.cr;render();});
  const rsa=document.getElementById('rangeStart'); if(rsa) rsa.onchange=()=>{rangeStart=rsa.value;render();};
  const rsb=document.getElementById('rangeEnd'); if(rsb) rsb.onchange=()=>{rangeEnd=rsb.value;render();};
  const car=document.querySelector('.tgtcarousel');
  if(car&&typeof window.__tgtFocus==='number'){ const sl=car.children[window.__tgtFocus];
    if(sl) requestAnimationFrame(()=>{ car.scrollLeft=Math.max(0,sl.offsetLeft-car.offsetLeft); }); }
}
document.getElementById('tabs').querySelectorAll('button').forEach(b=>{
  b.onclick=()=>{ currentTab=b.dataset.t;
    document.querySelectorAll('#tabs button').forEach(x=>x.classList.toggle('on',x===b)); render(); };
});
document.getElementById('overlay').onclick=e=>{ if(e.target.id==='overlay') closeModal(); };
window.addEventListener('resize',()=>{ if(currentTab==='grafik') drawChart(); });

/* ---------- init + migration ---------- */
(async function init(){
  // "Ana ekrana ekle" ipucu - sadece iOS Safari'de, Claude disinda ve henuz eklenmemisse
  try{
    var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
    var standalone=(window.navigator.standalone===true)||matchMedia('(display-mode: standalone)').matches;
    if(isIOS && !standalone && !window.storage){ var b=document.getElementById('iosbanner'); if(b) b.classList.remove('hide'); }
  }catch(e){}

  entries=await sget(KEY_E); settings=await sget(KEY_S); allocs=await sget(KEY_A);
  if(!settings){ settings=defaultSettings(); await sset(KEY_S,settings); }
  if(!entries){ entries=seed(); await sset(KEY_E,entries); }
  if(!Array.isArray(allocs)){ allocs=[{id:'a0',date:'2026-07-03',values:{tl:2326447,doviz:668423,emtia:1012583}}]; await sset(KEY_A,allocs); }
  if(!Array.isArray(settings.allocTypes)||!settings.allocTypes.length){ settings.allocTypes=[{key:'tl',label:'TL'},{key:'doviz',label:'Döviz'},{key:'emtia',label:'Emtia'}]; await sset(KEY_S,settings); }
  if(!settings.catAlloc){ settings.catAlloc={}; await sset(KEY_S,settings); }
  if(!settings.version || settings.version<2){
    (entries||[]).forEach(e=>{ if(e.values){ settings.categories.forEach(c=>{
      if(c.mult && c.mult!==1 && e.values[c.key]!=null){ e.values[c.key]=Number(e.values[c.key])*c.mult; }
    }); } });
    settings.categories.forEach(c=>{ delete c.mult; });
    if(!settings.categories.some(c=>c.key==='diger')) settings.categories.push({key:'diger',label:'Diğer'});
    settings.version=2;
    await sset(KEY_S,settings); await sset(KEY_E,entries);
  }
  if(!Array.isArray(settings.targets)){
    settings.targets = settings.target ? [{id:'t'+Date.now(),label:'Hedef',amount:Number(settings.target),date:settings.targetDate||null}] : [];
    delete settings.target; delete settings.targetDate;
    await sset(KEY_S,settings);
  }
  settings.targets.forEach(g=>{
    if(g.cur==='usd' && g.amount && !g.amountUsd){ g.amountUsd=g.amount; g.amount=null; }
    delete g.cur;
  });
  await sset(KEY_S,settings);
  render();
  if(settings.pin&&settings.pin.hash) showLock();
  autoFillActRates();
})();
</script>
